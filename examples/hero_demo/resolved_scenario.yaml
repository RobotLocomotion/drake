  output_delay: 0.0
  rgb: true
  depth: true
  label: true
  show_rgb: false
  do_compress: true
  lcm_bus: camera
model_drivers:
  left::panda: !PandaArmDriver
    hand_model_name: left::panda_hand
    control_mode: position_only
    arm_child_frame_name: panda_link0
    gripper_parent_frame_name: panda_link8
    ext_joint_filter_tau: 0.01
    lcm_bus: left
  left::panda_hand: !SchunkWsgImplicitPdDriver {}
  right::panda: !PandaArmDriver
    hand_model_name: right::panda_hand
    control_mode: position_only
    arm_child_frame_name: panda_link0
    gripper_parent_frame_name: panda_link8
    ext_joint_filter_tau: 0.01
    lcm_bus: right
  right::panda_hand: !SchunkWsgImplicitPdDriver {}
sensor_drivers: []
optitrack_lcm_bus: default
plant_config:
  time_step: 0.01
  use_sampled_output_ports: true
  penetration_allowance: 0.002
  stiction_tolerance: 0.0001
  contact_model: hydroelastic_with_fallback
  discrete_contact_approximation: lagged
  sap_near_rigid_threshold: 1.0
  contact_surface_representation: polygon
  adjacent_bodies_collision_filters: true
simulator_config:
  integration_scheme: runge_kutta2
  max_step_size: 0.001
  accuracy: 0.01
  use_error_control: false
  start_time: 0.0
  target_realtime_rate: 1.0
  publish_every_time_step: false
scene_graph_config:
  default_proximity_properties:
    compliance_type: undefined
    hydroelastic_modulus: 10000000.0
    resolution_hint: 0.02
    margin: 0.0001
    dynamic_friction: 0.5
    static_friction: 0.5
    hunt_crossley_dissipation: 50.0
    relaxation_time: 0.1
    point_stiffness: 1000000.0
visualization:
  lcm_bus: visualizer_bus
  publish_period: 0.05
  publish_illustration: true
  default_illustration_color:
    rgba: [0.9, 0.9, 0.9, 1.0]
  publish_proximity: true
  default_proximity_color:
    rgba: [0.8, 0.0, 0.0, 1.0]
  initial_proximity_alpha: 0.5
  publish_contacts: false
  publish_inertia: true
  enable_meshcat_creation: true
  delete_on_initialization_event: true
  enable_alpha_sliders: false
logging:
  log_dir: ''
  logs:
  - !KeyframesLogging
    filename: /tmp/anzu_recordings/demonstration_0/keyframes.txt
    frequency_fps: 10.0
  - !HtmlRecording
    filename: /tmp/anzu_recordings/demonstration_0/recording.html
    frequency_fps: 20.0
preconditions:
  num_sample_attempts: 100
  constraints: {}
ros_node_name: hardware_station_simulation
