# -*- yaml -*-
---
# distances are meters; angles are degrees.
maliput_multilane_builder:
  id: "circuit"
  lane_width: 5
  left_shoulder: 1
  right_shoulder: 1.5
  elevation_bounds: [0, 5]
  linear_tolerance: 0.01
  angular_tolerance: 0.5
  points:
    a:
      xypoint: [0, 0, 0]
      zpoint: [0, 0, 0, 0]
  connections:
    s1:
      lanes: [3, 0, 0]
      start: ["ref", "points.a.forward"]
      length: 50
      z_end: ["ref", [0, 0, 0, 0]]
    s2:
      lanes: [1, 0, 5]
      start: ["ref", "connections.s1.end.1.forward"]
      arc: [15, 180]
      z_end: ["ref", [0, 0, 0, 0]]
    s3:
      lanes: [1, 0, 5]
      start: ["ref", "connections.s2.end.ref.forward"]
      length: 50
      z_end: ["ref", [0, 0, 0, 0]]
    s4:
      lanes: [1, 0, 5]
      start: ["ref", "connections.s3.end.ref.forward"]
      arc: [15, 180]
      explicit_end: ["ref", "connections.s1.start.ref.forward"]
    s5:
      lanes: [2, 0, 0]
      start: ["ref", "connections.s1.end.0.forward"]
      arc: [20, -180]
      z_end: ["ref", [0, 0, 0, 0]]
    s6:
      lanes: [2, 0, 0]
      start: ["ref", "connections.s5.end.0.forward"]
      length: 50
      z_end: ["ref", [0, 0, 0, 0]]
    s7:
      lanes: [2, 0, 0]
      start: ["ref", "connections.s6.end.0.forward"]
      arc: [20, -180]
      explicit_end: ["ref", "connections.s1.start.ref.forward"]
    s8:
      lanes: [1, 0, 0]
      start: ["ref", "connections.s6.end.1.forward"]
      arc: [20, 90]
      z_end: ["ref", [5, 0.5, -15, 0.7255]]
    s9:
      lanes: [1, 0, 0]
      start: ["ref", "connections.s8.end.ref.forward"]
      arc: [20, 90]
      z_end: ["ref", [10, 0, -15, 0]]
    s10:
      lanes: [1, 0, 0]
      start: ["ref", "connections.s9.end.ref.forward"]
      arc: [20, 90]
      z_end: ["ref", [10, 0, 0, 0]]
    s11:
      lanes: [1, 0, 0]
      start: ["ref", "connections.s10.end.0.forward"]
      length: 30
      explicit_end: ["ref", "connections.s10.end.ref.forward"]
    s12:
      lanes: [1, 0, 0]
      start: ["ref", "connections.s11.end.0.forward"]
      length: 30
      z_end: ["ref", [-10, 0, 0, 0]]
    s13:
      lanes: [1, 0, 0]
      start: ["ref", "connections.s12.end.ref.forward"]
      length: 20
      z_end: ["ref", [-10, 0, 0, 0]]
    s14:
      lanes: [1, 0, 0]
      left_shoulder: 0
      start: ["ref", "connections.s13.end.ref.forward"]
      arc: [20, 90]
      z_end: ["ref", [0, 0, 0, 0]]
    s15:
      lanes: [1, 0, 0]
      left_shoulder: 0
      left_shoulder: 0
      start: ["ref", "connections.s14.end.ref.forward"]
      arc: [15, 180]
      z_end: ["ref", [0, 0, 0, 0]]
  groups:
    g1: [s2, s5]
    g2: [s4, s8, s10, s15]
